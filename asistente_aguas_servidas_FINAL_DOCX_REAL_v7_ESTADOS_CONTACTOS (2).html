function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function norm(s){return (s||'').replace(/\u00a0/g,' ').replace(/[ \t]+/g,' ').replace(/\s*\n\s*/g,' ').trim();}
function tituloNombre(s){return (s||'').trim().replace(/\s+/g,' ').toLowerCase().split(' ').map(w=>w.split(/([-\/])/).map(part=>/^[a-záéíóúñü]/i.test(part)?part.charAt(0).toUpperCase()+part.slice(1):part).join('')).join(' ').replace(/\bn[°º]/gi,'N°');}
function fmtFecha(v){v=(v||'').trim(); if(!v) return ''; let m=v.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/); if(!m) return v; const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre']; return parseInt(m[1])+' de '+meses[parseInt(m[2])-1]+' del '+m[3];}
function val(re,t){let m=t.match(re); return m?m[1].trim():'';}

function detectarTratamiento(t){return (/\bSeñora\b/i.test(t)||/\bSra\.?\b/i.test(t)||/por la Sra\./i.test(t)||/\(ella\)/i.test(t))?'Señora':'Señor';}
async function leerPDF(){const f=$('pdfFile').files[0]; if(!f){alert('Selecciona un PDF');return;} limpiarCampos(); const data=new Uint8Array(await f.arrayBuffer()); pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; const pdf=await pdfjsLib.getDocument({data}).promise; let text=''; for(let p=1;p<=pdf.numPages;p++){const page=await pdf.getPage(p); const tc=await page.getTextContent(); text+=tc.items.map(i=>i.str).join(' ')+'\n';} $('rawText').value=text; extraerDesdeTexto(text,false); $('msg').textContent='PDF leído. Datos anteriores limpiados y campos detectados.';}
function lineas(raw){return (raw||'').replace(/\r/g,'\n').split(/\n+/).map(x=>x.trim()).filter(Boolean);}
function limpiaDir(x){return (x||'').replace(/\s+-\s*Despacho\s+postal.*$/i,'').replace(/\s+Despacho\s+postal.*$/i,'').replace(/\s+Depto\b.*$/i,'').replace(/\s+Otra\s+Referencia.*$/i,'').replace(/\s+Comuna\b.*$/i,'').replace(/\s*[-–]\s*$/,'').trim();}
function normalizaRut(r){
  r=(r||'').replace(/[^\dKk]/g,'').toUpperCase();
  if(r.length>=2) return r.slice(0,-1)+'-'+r.slice(-1);
  return r;
}
function extraerRutSernac(t){
  const patrones=[
    /Datos\s+de\s+la\s+persona\s+consumidora.*?(?:Rut|RUT)\s*:?\s*([\d\.]{6,12}\s*-?\s*[0-9Kk])/i,
    /Nombres\s*:.*?Apellidos\s*:.*?(?:Rut|RUT)\s*:?\s*([\d\.]{6,12}\s*-?\s*[0-9Kk])/i,
    /documento\s+de\s+identificaci[oó]n\s*:?\s*([\d\.]{6,12}\s*-?\s*[0-9Kk])/i,
    /(?:Rut|RUT)\s*:?\s*([\d\.]{6,12}\s*-?\s*[0-9Kk])/i
  ];
  for(const re of patrones){
    const m=t.match(re);
    if(m && m[1]){
      const rut=normalizaRut(m[1]);
      if(rut && rut!=='61808000-5') return rut; // evita RUT empresa Aguas Andinas
    }
  }
  return '';
}
function normalizaNum(x){return (x||'').replace(/\s+/g,'').trim();}

function headerTable(leftLines,rightLines){
  // Encabezado Word REAL sin tabla: evita que Word muestre el controlador de tabla/objeto.
  // El texto queda editable línea por línea; solo logo/firma son imágenes.
  let L=[]; cleanLines(leftLines).forEach((ln,idx)=>{
    if(idx===2 && ln.length>44) L.push(...wrapDocLine(ln,44)); else L.push(ln);
  });
  const R=cleanLines(rightLines);
  // La referencia corporativa debe ir más abajo, al lado derecho,
  // a la altura de 'Presente' o justo después, para que no choque con dirección larga.
  const start=Math.max(3, L.length-1);
  const total=Math.max(L.length,start+R.length);
  let xml='';
  for(let i=0;i<total;i++){
    const left=L[i]||''; const right=R[i-start]||'';
    const isPres=/^Presente$/i.test(left.trim());
    const after=(i===total-1)?320:0;
    xml+=`<w:p><w:pPr><w:tabs><w:tab w:val="right" w:pos="9898"/></w:tabs><w:spacing w:after="${after}" w:line="220" w:lineRule="auto"/></w:pPr>`;
    xml+=`<w:r>${runProps({underline:isPres})}<w:t xml:space="preserve">${x(left)}</w:t></w:r>`;
    if(right) xml+=`<w:r>${runProps()}<w:tab/><w:t xml:space="preserve">${x(right)}</w:t></w:r>`;
    xml+='</w:p>';
  }
  return xml;
}
